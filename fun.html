<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHAYNOVA</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 208, 64, .42), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(0, 229, 255, .38), transparent 30%),
        radial-gradient(circle at 50% 85%, rgba(255, 73, 206, .30), transparent 34%),
        linear-gradient(135deg, #dd7a13 0%, #f32708 48%, #e41877 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: .35;
    }

    header {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 1050px);
      z-index: 50;
      display: flex;
      justify-content: center;
      padding: 12px 18px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 0 28px rgba(0,217,255,.25);
    }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    nav a {
      font-size: .95rem;
      font-weight: 700;
      color: white;
      text-decoration: none;
      letter-spacing: .6px;
      transition: .25s ease;
    }

    nav a:hover {
      color: #001019;
      text-shadow: 0 0 14px rgba(255,255,255,.9);
    }

    #musicPlayer {
      position: fixed;
      top: 88px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 650px);
      z-index: 45;
      padding: 14px 20px 26px;
      border-radius: 24px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 8px 30px rgba(0,0,0,.18);
    }

    #songTitle {
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #songSelect {
      width: 100%;
      padding: 8px 14px;
      border: none;
      border-radius: 999px;
      background: white;
      color: #111;
      font-size: 15px;
      font-weight: 600;
      outline: none;
    }

    #musicBtn {
      position: absolute;
      left: 50%;
      bottom: -23px;
      transform: translateX(-50%);
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 50%;
      background: white;
      color: #111;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
      transition: .25s ease;
    }

    #musicBtn:hover {
      transform: translateX(-50%) scale(1.08);
    }

main{
    position:relative;
    z-index:5;

    min-height:100vh;

    display:flex;
    flex-direction:column;

    align-items:center;
    justify-content:center;

    text-align:center;

    padding:220px 20px 80px;
}

#logo{
    width:min(330px,82vw);
    margin-bottom:40px;

    filter:
        drop-shadow(0 0 12px rgba(255,255,255,.4))
        drop-shadow(0 0 28px rgba(0,217,255,.5));

    animation:logoFloat 3.2s ease-in-out infinite;
}

#storyList{

    width:min(720px,90vw);

    display:flex;
    flex-direction:column;
    align-items:center;

    background:rgba(255,255,255,.12);

    border:1px solid rgba(255,255,255,.25);

    border-radius:28px;

    padding:30px;

    backdrop-filter:blur(18px);

    box-shadow:
        0 15px 40px rgba(0,0,0,.25);
}

#storyList h2{

    margin-bottom:24px;

    font-size:30px;

    color:white;

    text-align:center;
}

#storyButtons{

    width:100%;

    display:flex;
    flex-direction:column;

    gap:16px;
}
    #storyLayer {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
    }

    .storyBubble {
      position: absolute;
      width: 74px;
      height: 74px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.22);
      border: 1px solid rgba(255,255,255,.4);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: white;
      font-weight: 700;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 0 24px rgba(0,217,255,.45);
      animation: popIn .35s ease;
    }

    .storyBubble:hover {
      transform: scale(1.08);
    }

    .storyWindow {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(90vw, 560px);
      max-height: 72vh;
      transform: translate(-50%, -50%);
      z-index: 200;
      padding: 24px;
      border-radius: 28px;
      background: rgba(10, 15, 25, .9);
      border: 1px solid rgba(255,255,255,.28);
      color: white;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      overflow-y: auto;
      pointer-events: auto;
    }

    .storyWindow h2 {
      margin-bottom: 14px;
    }

    .storyWindow p {
      line-height: 1.6;
      white-space: pre-line;
    }

    .storyClose {
      margin-top: 20px;
      padding: 10px 18px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      background: white;
      color: #111;
    }

    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 12px;
      z-index: 30;
      text-align: center;
      color: #e9fbff;
      font-size: 14px;
      text-shadow: 0 0 12px rgba(0,217,255,.6);
      padding-bottom: env(safe-area-inset-bottom);
      pointer-events: none;
    }

    @keyframes logoFloat {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-9px);
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(.4);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media screen and (max-width: 560px) {
      header {
        top: 12px;
        border-radius: 24px;
      }

      nav {
        gap: 13px;
      }

      nav a {
        font-size: .82rem;
      }

      #musicPlayer {
        top: 100px;
        width: 94vw;
      }

      main {
        padding-top: 250px;
      }

      .storyBubble {
        width: 64px;
        height: 64px;
        font-size: 13px;
      }
    }

.storyPhoto {
  width: 100%;
  max-height: 260px;
  object-fit: cover;
  border-radius: 20px;
  margin-bottom: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,.35);
}

#storyList{
    margin-top:50px;
    width:min(700px,90vw);

    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.25);

    border-radius:28px;

    padding:28px;

    backdrop-filter:blur(18px);
}

#storyList h2{
    margin-bottom:22px;
    text-align:center;
}

#storyButtons{
    display:grid;
    gap:14px;
}

.storyItem{
    display:flex;
    align-items:center;
    gap:16px;

    padding:14px 18px;

    border:none;
    border-radius:18px;

    background:rgba(255,255,255,.10);

    color:white;

    cursor:pointer;

    transition:.25s;
}

.storyItem:hover{
    background:rgba(255,255,255,.22);
    transform:translateY(-2px);
}

.storyThumb{
    width:70px;
    height:70px;

    border-radius:14px;

    object-fit:cover;
}

.storyTitle{
    font-size:18px;
    font-weight:bold;
}

.storyPreview{
    font-size:13px;
    opacity:.8;
    margin-top:4px;
}


  </style>
</head>

<body>
  <header>
    <nav>
      <a href="shop.html">Store</a>
      <a href="fun.html">Fun</a>
      <a href="support.html">Support</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div id="musicPlayer">
    <div id="songTitle">Strawberry Elephant</div>
    <select id="songSelect"></select>
    <button id="musicBtn">▶</button>
  </div>

  <audio id="bgMusic"></audio>

  <div id="storyLayer"></div>

 <main>

    <img id="logo"
         src="logo/WHITEDYNAMICTRANS.png"
         alt="CHAYNOVA Logo">

    <section id="storyList">

        <h2>📖 Stories</h2>

        <div id="storyButtons"></div>

    </section>

</main>

  <footer>
    © 2026 CHAYNOVA
  </footer>

  <script>
    onst songs = [
      {
        title: "Strawberry Elephant one",
        file: "audio/strawberryElephantE.mp3"
      },
      {
        title: "I Miss You Every Day",
        file: "audio/background.mp3"
      },
      {
        title: "The 25th Floor",
        file: "audio/the25thFloor.mp3"
      },
      {
        title: "Love Defenders Do",
        file: "audio/LoveDefendersDo.mp3"
      },
      {
        title: "Strawberry Elephant Thai",
        file: "audio/strawberryElephant.mp3"
      },
    ];

  const stories = [
  {
    title: "Story 1",
    text: "text 1",
    photo: "images/story1.jpg"
  },
  {
    title: "Story 2",
    text: "text 2",
    photo: "images/story2.jpg"
  },
  {
    title: "Story 3",
    text: "text 3",
    photo: "images/story3.jpg"
  },
  {
    title: "Story 4",
    text: "text 4",
    photo: "images/story4.jpg"
  },
  {
    title: "Story 5",
    text: "text 5",
    photo: "images/story5.jpg"
  }
];

const storyButtons=document.getElementById("storyButtons");

stories.forEach(story=>{

    const button=document.createElement("button");

    button.className="storyItem";

    button.innerHTML=`
        <img class="storyThumb" src="${story.photo}">
        <div>
            <div class="storyTitle">${story.title}</div>
            <div class="storyPreview">
                ${story.text.substring(0,80)}...
            </div>
        </div>
    `;

    button.onclick=()=>openStoryWindow(story);

    storyButtons.appendChild(button);

});

    const music = document.getElementById("bgMusic");
    const musicBtn = document.getElementById("musicBtn");
    const songSelect = document.getElementById("songSelect");
    const songTitle = document.getElementById("songTitle");
    const storyLayer = document.getElementById("storyLayer");

    let currentSong = 0;
    const maxPopups = 3;

    music.volume = 0.35;

    songs.forEach((song, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = song.title;
      songSelect.appendChild(option);
    });

    function loadSong(index) {
      currentSong = index;
      music.src = songs[index].file;
      songTitle.textContent = songs[index].title;
      songSelect.value = index;
    }

    loadSong(currentSong);

    musicBtn.addEventListener("click", () => {
      if (music.paused) {
        music.play()
          .then(() => {
            musicBtn.textContent = "❚❚";
          })
          .catch(() => {
            musicBtn.textContent = "▶";
          });
      } else {
        music.pause();
        musicBtn.textContent = "▶";
      }
    });

    songSelect.addEventListener("change", () => {
      const selectedSong = Number(songSelect.value);
      loadSong(selectedSong);

      music.play()
        .then(() => {
          musicBtn.textContent = "❚❚";
        })
        .catch(() => {
          musicBtn.textContent = "▶";
        });
    });

    music.addEventListener("ended", () => {
      currentSong = (currentSong + 1) % songs.length;
      loadSong(currentSong);
      music.play();
    });

    function showRandomStory() {
      const currentPopups = document.querySelectorAll(".storyBubble").length;

      if (currentPopups >= maxPopups) return;

      const story = stories[Math.floor(Math.random() * stories.length)];

      const bubble = document.createElement("button");
      bubble.className = "storyBubble";
      bubble.textContent = story.title;

      const bubbleSize = 74;
      const safeTop = 170;
      const safeBottom = 90;

      const maxX = window.innerWidth - bubbleSize - 20;
      const maxY = window.innerHeight - bubbleSize - safeBottom;

      const x = 20 + Math.random() * Math.max(0, maxX - 20);
      const y = safeTop + Math.random() * Math.max(0, maxY - safeTop);

      bubble.style.left = `${x}px`;
      bubble.style.top = `${y}px`;

      bubble.addEventListener("click", () => {
        bubble.remove();
        openStoryWindow(story);
      });

      storyLayer.appendChild(bubble);

      setTimeout(() => {
        bubble.remove();
      }, 9000);
    }

   function openStoryWindow(story) {
  const existingWindow = document.querySelector(".storyWindow");

  if (existingWindow) {
    existingWindow.remove();
  }

  const storyWindow = document.createElement("div");
  storyWindow.className = "storyWindow";

  storyWindow.innerHTML = `
    <img class="storyPhoto" src="${story.photo}" alt="${story.title}">
    <h2>${story.title}</h2>
    <p>${story.text}</p>
    <button class="storyClose">Close</button>
  `;

  storyWindow.querySelector(".storyClose").addEventListener("click", () => {
    storyWindow.remove();
  });

  document.body.appendChild(storyWindow);
}

    setInterval(showRandomStory, 3000);
  </script>
</body>
</html>
