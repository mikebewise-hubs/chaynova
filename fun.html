main{

}
    #storyLayer {

    .storyBubble {

    .storyWindow {

.storyPhoto {

<body>
 <header class="top-header">

 <main>

    <img id="logo"
         src="logo/WHITEDYNAMICTRANS.png"
         alt="CHAYNOVA Logo">

        <h2>📖 Stories</h2>

<div id="loginOverlay" class="login-overlay" aria-hidden="true">
    <div class="login-box">

        <h2>CHAYNOVA Admin</h2>

        <div id="loginForm">
            <input id="usernameInput" type="text" placeholder="Username" autocomplete="username">

            <button class="logout-btn" type="button" onclick="closeLogin()">Close</button>
        </div>

    </div>
</div>

  <script>
    const songs = [
      {
        title: "Strawberry Elephant one",
        file: "audio/strawberryElephantE.mp3"
      },
      {
        title: "I Miss You Every Day",
        file: "audio/background.mp3"
      },
      {
        title: "The 25th Floor",
        file: "audio/the25thFloor.mp3"
      },
      {
        title: "Love Defenders Do",
        file: "audio/LoveDefendersDo.mp3"
      },
      {
        title: "Strawberry Elephant Thai",
        file: "audio/strawberryElephant.mp3"
      }
    ];

  const stories = [
  {
    title: "Story 1",
    text: "text 1",
    photo: "images/story1.jpg"
  },
  {
    title: "Story 2",
    text: "text 2",
    photo: "images/story2.jpg"
  },
  {
    title: "Story 3",
    text: "text 3",
    photo: "images/story3.jpg"
  },
  {
    title: "Story 4",
    text: "text 4",
    photo: "images/story4.jpg"
  },
  {
    title: "Story 5",
    text: "text 5",
    photo: "images/story5.jpg"
  }
];

const storyButtons=document.getElementById("storyButtons");

stories.forEach(story=>{

    const button=document.createElement("button");

    button.className="storyItem";

    button.innerHTML=`
        <img class="storyThumb" src="${story.photo}">
        <div>
            <div class="storyTitle">${story.title}</div>
            <div class="storyPreview">
                ${story.text.substring(0,80)}...
            </div>
        </div>
    `;

    button.onclick=()=>openStoryWindow(story);

    storyButtons.appendChild(button);

});

    const music = document.getElementById("bgMusic");
    const musicBtn = document.getElementById("musicBtn");
    const songSelect = document.getElementById("songSelect");
    const songTitle = document.getElementById("songTitle");
    const storyLayer = document.getElementById("storyLayer");

    let currentSong = 0;
    const maxPopups = 3;

    music.volume = 0.35;

    songs.forEach((song, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = song.title;
      songSelect.appendChild(option);
    });

    function loadSong(index) {
      currentSong = index;
      music.src = songs[index].file;
      songTitle.textContent = songs[index].title;
      songSelect.value = index;
    }

    loadSong(currentSong);

    musicBtn.addEventListener("click", () => {
      if (music.paused) {
        music.play()
          .then(() => {
            musicBtn.textContent = "❚❚";
          })
          .catch(() => {
            musicBtn.textContent = "▶";
          });
      } else {
        music.pause();
        musicBtn.textContent = "▶";
      }
    });

    songSelect.addEventListener("change", () => {
      const selectedSong = Number(songSelect.value);
      loadSong(selectedSong);

      music.play()
        .then(() => {
          musicBtn.textContent = "❚❚";
        })
        .catch(() => {
          musicBtn.textContent = "▶";
        });
    });

    music.addEventListener("ended", () => {
      currentSong = (currentSong + 1) % songs.length;
      loadSong(currentSong);
      music.play();
    });

    function showRandomStory() {
      const currentPopups = document.querySelectorAll(".storyBubble").length;

      if (currentPopups >= maxPopups) return;

      const story = stories[Math.floor(Math.random() * stories.length)];

      const bubble = document.createElement("button");
      bubble.className = "storyBubble";
      bubble.textContent = story.title;

      const bubbleSize = 74;
      const safeTop = 170;
      const safeBottom = 90;

      const maxX = window.innerWidth - bubbleSize - 20;
      const maxY = window.innerHeight - bubbleSize - safeBottom;

      const x = 20 + Math.random() * Math.max(0, maxX - 20);
      const y = safeTop + Math.random() * Math.max(0, maxY - safeTop);

      bubble.style.left = `${x}px`;
      bubble.style.top = `${y}px`;

      bubble.addEventListener("click", () => {
        bubble.remove();
        openStoryWindow(story);
      });

      storyLayer.appendChild(bubble);

      setTimeout(() => {
        bubble.remove();
      }, 9000);
    }

   function openStoryWindow(story) {
  const existingWindow = document.querySelector(".storyWindow");

  if (existingWindow) {
    existingWindow.remove();
  }

  const storyWindow = document.createElement("div");
  storyWindow.className = "storyWindow";

  storyWindow.innerHTML = `
    <img class="storyPhoto" src="${story.photo}" alt="${story.title}">
    <h2>${story.title}</h2>
    <p>${story.text}</p>
    <button class="storyClose">Close</button>
  `;

  storyWindow.querySelector(".storyClose").addEventListener("click", () => {
    storyWindow.remove();
  });

  document.body.appendChild(storyWindow);
}

const AUTH_WORKER_URL = "/api/admin-login";
const ADMIN_SESSION_KEY = "chaynovaAdminAuthenticated";

function openLogin(){
    const overlay = document.getElementById("loginOverlay");
    overlay.style.display = "flex";
    overlay.setAttribute("aria-hidden", "false");
    document.getElementById("loginError").innerText = "";
    updateAdminPanel();

    setTimeout(() => {
        const usernameInput = document.getElementById("usernameInput");
        if(usernameInput && usernameInput.offsetParent !== null){
            usernameInput.focus();
        }
    }, 100);
}

function closeLogin(){
    const overlay = document.getElementById("loginOverlay");
    overlay.style.display = "none";
    overlay.setAttribute("aria-hidden", "true");
    document.getElementById("loginError").innerText = "";
}

async function checkLogin(){
    const usernameInput = document.getElementById("usernameInput");
    const passwordInput = document.getElementById("passwordInput");
    const username = usernameInput.value.trim();
    const password = passwordInput.value;
    const errorBox = document.getElementById("loginError");

    if(!username || !password){
        errorBox.innerText = "Please enter username and password.";
        return;
    }

    errorBox.innerText = "Checking login...";

    try{
        const response = await fetch(AUTH_WORKER_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            credentials: "include",
            body: JSON.stringify({ username, password })
        });

        let data = {};
        try{
            data = await response.json();
        }catch(_){
            data = {};
        }

        if(!response.ok || data.success === false){
            throw new Error(data.message || "Wrong username or password.");
        }

        sessionStorage.setItem(ADMIN_SESSION_KEY, "yes");
        passwordInput.value = "";
        errorBox.innerText = "";
        updateAdminPanel();
    }catch(error){
        sessionStorage.removeItem(ADMIN_SESSION_KEY);
        updateAdminPanel();
        errorBox.innerText = error.message || "Login failed. Check your Worker API.";
    }
}

function updateAdminPanel(){
    const loggedIn = sessionStorage.getItem(ADMIN_SESSION_KEY) === "yes";
    const loginForm = document.getElementById("loginForm");
    const adminPanel = document.getElementById("adminPanel");

    if(loggedIn){
        loginForm.style.display = "none";
        adminPanel.style.display = "flex";
    }else{
        loginForm.style.display = "block";
        adminPanel.style.display = "none";
    }
}

function logoutAdmin(){
    sessionStorage.removeItem(ADMIN_SESSION_KEY);
    document.getElementById("usernameInput").value = "";
    document.getElementById("passwordInput").value = "";
    document.getElementById("loginError").innerText = "";
    updateAdminPanel();
}

document.getElementById("passwordInput").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        checkLogin();
    }
});

document.getElementById("usernameInput").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        document.getElementById("passwordInput").focus();
    }
});

document.getElementById("loginOverlay").addEventListener("click", function(e){
    if(e.target === this){
        closeLogin();
    }
});

window.addEventListener("keydown", function(e){
    if(e.key === "Escape"){
        closeLogin();
    }
});

window.openLogin = openLogin;
window.closeLogin = closeLogin;
window.checkLogin = checkLogin;
window.logoutAdmin = logoutAdmin;

updateAdminPanel();


    setInterval(showRandomStory, 3000);
  </script>
