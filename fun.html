<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun| CHAYNOVA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            background:
                radial-gradient(circle at 15% 20%, rgba(255, 208, 64, .42), transparent 28%),
                radial-gradient(circle at 85% 18%, rgba(0, 229, 255, .38), transparent 30%),
                radial-gradient(circle at 50% 85%, rgba(255, 73, 206, .30), transparent 34%),
                linear-gradient(135deg, #dd7a13 0%, #f32708 48%, #e41877 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(rgba(255, 255, 255, .08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .08) 1px, transparent 1px);
            background-size: 42px 42px;
            opacity: .35;
        }

        header {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: min(92vw, 1050px);
            z-index: 30;
            display: flex;
            justify-content: center;
            padding: 8px 18px;
            border: 1px solid rgba(255, 255, 255, .25);
            border-radius: 999px;
            background: rgba(255, 255, 255, .12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 0 28px rgba(0, 217, 255, .25);
        }

        header a:hover,
        header a[aria-current="page"] {
            color: #001019;
            text-shadow: 0 0 14px rgba(255, 255, 255, .9);
        }

        header a {
            position: relative;
            font-family: "Oxanium", sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: 0.6px;
            transition: 0.25s ease;
        }

        nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        nav a {
            font-size: .95rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: .6px;
            transition: .25s ease;
        }

        nav a:hover {
            color: #001019;
            text-shadow: 0 0 14px rgba(255, 255, 255, .9);
        }

        #musicPlayer {
            position: fixed;
            top: 88px;
            left: 50%;
            transform: translateX(-50%);
            width: min(92vw, 650px);
            z-index: 45;
            padding: 14px 20px 34px;
            border-radius: 24px;
            background: rgba(255, 255, 255, .15);
            border: 1px solid rgba(255, 255, 255, .25);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, .18);
        }

        #songTitle {
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #songSelect {
            width: 100%;
            padding: 8px 14px;
            border: none;
            border-radius: 999px;
            background: white;
            color: #111;
            font-size: 15px;
            font-weight: 600;
            outline: none;
        }

        #musicBtn {
            position: absolute;
            left: 50%;
            bottom: -23px;
            transform: translateX(-50%);
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 50%;
            background: white;
            color: #111;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .25);
            transition: .25s ease;
        }

        #musicBtn:hover {
            transform: translateX(-50%) scale(1.08);
        }

        /* Curved volume control below the play button */
        #volumeControl {
            position: absolute;
            left: 50%;
            bottom: -78px;
            width: 130px;
            height: 58px;
            transform: translateX(-50%);
            touch-action: none;
            user-select: none;
            cursor: pointer;
        }

        #volumeControl svg {
            width: 100%;
            height: 100%;
            overflow: visible;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, .28));
        }

        .volume-track {
            fill: none;
            stroke: rgba(255, 255, 255, .28);
            stroke-width: 8;
            stroke-linecap: round;
        }

        .volume-progress {
            fill: none;
            stroke: white;
            stroke-width: 8;
            stroke-linecap: round;
        }

        .volume-knob {
            fill: white;
            stroke: rgba(0, 0, 0, .18);
            stroke-width: 2;
        }


        body.iphone-device #volumeControl {
            display: none;
        }

        body.iphone-device #musicBtn {
            bottom: -55px;
        }

        #volumeValue {
            position: absolute;
            left: 50%;
            bottom: -4px;
            transform: translateX(-50%);
            min-width: 38px;
            color: white;
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0, 0, 0, .45);
            pointer-events: none;
        }

        main {
            position: relative;
            z-index: 5;

            min-height: 100vh;

            display: flex;
            flex-direction: column;

            align-items: center;
            justify-content: center;

            text-align: center;

            padding: 275px 20px 80px;
        }

        #logo {
            width: min(330px, 82vw);
            margin-bottom: 40px;

            filter:
                drop-shadow(0 0 12px rgba(255, 255, 255, .4)) drop-shadow(0 0 28px rgba(0, 217, 255, .5));

            animation: logoFloat 3.2s ease-in-out infinite;
        }

        #storyList {

            width: min(720px, 90vw);

            display: flex;
            flex-direction: column;
            align-items: center;

            background: rgba(255, 255, 255, .12);

            border: 1px solid rgba(255, 255, 255, .25);

            border-radius: 28px;

            padding: 30px;

            backdrop-filter: blur(18px);

            box-shadow:
                0 15px 40px rgba(0, 0, 0, .25);
        }

        #storyList h2 {

            margin-bottom: 24px;

            font-size: 30px;

            color: white;

            text-align: center;
        }

        #storyButtons {

            width: 100%;

            display: flex;
            flex-direction: column;

            gap: 16px;
        }

        #storyLayer {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
        }

        .storyBubble {
            position: absolute;
            width: 74px;
            height: 74px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, .22);
            border: 1px solid rgba(255, 255, 255, .4);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: white;
            font-weight: 700;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 24px rgba(0, 217, 255, .45);
            animation: popIn .35s ease;
        }

        .storyBubble:hover {
            transform: scale(1.08);
        }

        .storyWindow {
            position: fixed;
            left: 50%;
            top: 50%;
            width: min(92vw, 620px);
            max-height: 78vh;
            transform: translate(-50%, -50%);
            z-index: 200;
            padding: 64px 28px 28px;
            border-radius: 32px;
            background:
                radial-gradient(circle at 15% 15%, rgba(255, 214, 77, .28), transparent 32%),
                radial-gradient(circle at 85% 20%, rgba(0, 229, 255, .25), transparent 34%),
                radial-gradient(circle at 50% 95%, rgba(255, 47, 207, .22), transparent 38%),
                rgba(255, 255, 255, .16);
            border: 1px solid rgba(255, 255, 255, .38);
            color: white;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 25px 70px rgba(80, 0, 70, .35),
                0 0 35px rgba(255, 255, 255, .2),
                0 0 70px rgba(0, 217, 255, .24),
                inset 0 1px 0 rgba(255, 255, 255, .3);
            overflow-y: auto;
            pointer-events: auto;
        }

        .storyWindow h2 {
            margin-bottom: 16px;
            font-family: "Oxanium", sans-serif;
            font-size: clamp(25px, 5vw, 36px);
            font-weight: 700;
            color: white;
            text-shadow:
                0 0 12px rgba(255, 255, 255, .65),
                0 0 25px rgba(0, 217, 255, .55);
            overflow-wrap: anywhere;
        }

        .storyWindow p {
            line-height: 1.75;
            font-size: 16px;
            color: rgba(255, 255, 255, .94);
            white-space: pre-line;
            overflow-wrap: anywhere;
            padding: 18px;
            border-radius: 20px;
            background: rgba(20, 10, 35, .22);
            border: 1px solid rgba(255, 255, 255, .16);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .12);
        }

        .storyClose {
            margin-top: 20px;
            padding: 10px 18px;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            background: white;
            color: #111;
        }

        footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 12px;
            z-index: 300;
            text-align: center;
            padding: 10px 20px;
            color: #9bdfff;
            font-size: 14px;
            text-shadow: 0 0 12px rgba(0, 217, 255, 0.6);
        }

        .hidden-admin-btn {
            width: 22px;
            height: 22px;
            margin-left: 6px;
            padding: 0;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: rgba(255, 255, 255, 0.35);
            font-size: 20px;
            line-height: 22px;
            text-align: center;
            cursor: pointer;
            pointer-events: auto;
        }

        .hidden-admin-btn:hover {
            color: #00d9ff;
            text-shadow: 0 0 12px #00d9ff;
        }

        @keyframes logoFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-9px);
            }
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(.4);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media screen and (max-width: 560px) {
            header {
                top: 12px;
                border-radius: 24px;
            }

            nav {
                gap: 13px;
            }

            nav a {
                font-size: .82rem;
            }

            #musicPlayer {
                top: 100px;
                width: 94vw;
            }

            main {
                padding-top: 305px;
            }

            .storyBubble {
                width: 64px;
                height: 64px;
                font-size: 13px;
            }
        }

        .storyPhoto {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, .3);
            box-shadow:
                0 14px 35px rgba(0, 0, 0, .3),
                0 0 25px rgba(0, 217, 255, .25);
        }

        #storyList {
            margin-top: 50px;
            width: min(700px, 90vw);

            background: rgba(255, 255, 255, .12);
            border: 1px solid rgba(255, 255, 255, .25);

            border-radius: 28px;

            padding: 28px;

            backdrop-filter: blur(18px);
        }

        #storyList h2 {
            margin-bottom: 22px;
            text-align: center;
        }

        #storyButtons {
            display: grid;
            gap: 14px;
        }

        .storyItem {
            display: flex;
            align-items: center;
            gap: 16px;

            padding: 14px 18px;

            border: none;
            border-radius: 18px;

            background: rgba(255, 255, 255, .10);

            color: white;

            cursor: pointer;

            transition: .25s;
        }

        .storyItem:hover {
            background: rgba(255, 255, 255, .22);
            transform: translateY(-2px);
        }


        .story-card-wrap {
            width: 100%;
            display: grid;
            gap: 9px;
        }

        .story-admin-actions {
            display: flex;
            justify-content: flex-end;
            gap: 9px;
            padding: 0 4px;
        }

        .story-admin-actions button,
        .story-admin-actions a,
        .story-window-admin button,
        .story-window-admin a {
            border: none;
            border-radius: 999px;
            padding: 8px 15px;
            color: white;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            background: linear-gradient(90deg, #ff2fcf, #7b2cff, #00d9ff);
            box-shadow: 0 0 12px rgba(0, 217, 255, .35);
        }

        .story-admin-actions .delete-story-btn,
        .story-window-admin .delete-story-btn {
            background: linear-gradient(90deg, #8b101d, #ff5f73);
        }

        .story-window-admin {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .story-window-admin .storyClose {
            margin-top: 0;
        }

        .storyThumb {
            width: 70px;
            height: 70px;

            border-radius: 14px;

            object-fit: cover;
        }

        .storyTitle {
            font-size: 18px;
            font-weight: bold;
        }

        .storyPreview {
            font-size: 13px;
            opacity: .8;
            margin-top: 4px;
        }

        .top-nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-logo img {
            height: 22px;
            /* Adjust size as needed */
            width: auto;
            vertical-align: middle;
            transition: transform 0.2s ease;
        }

        .nav-logo img:hover {
            transform: scale(1.1);
        }

        footer {
            position: relative;
            z-index: 5;
            text-align: center;
            padding: 40px 20px;
            color: #9bdfff;
        }

        .hidden-admin-btn {
            width: 18px;
            height: 18px;
            margin-left: 6px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: rgba(255, 255, 255, .08);
            cursor: pointer;
        }

        .hidden-admin-btn:hover {
            color: #00d9ff;
            text-shadow: 0 0 12px #00d9ff;
        }

        .login-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 20, .82);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            width: min(92vw, 420px);
            padding: 28px;
            border-radius: 24px;
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .25);
            box-shadow: 0 0 35px rgba(0, 217, 255, .4);
            text-align: center;
        }

        .login-box h2 {
            color: #8ef2ff;
            margin-bottom: 18px;
        }

        .login-box input {
            width: 100%;
            margin: 10px 0;
            padding: 14px;
            border: none;
            border-radius: 14px;
            outline: none;
            font-size: 16px;
        }

        .login-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .login-actions button,
        .admin-panel a,
        .logout-btn {
            flex: 1;
            border: none;
            border-radius: 14px;
            padding: 12px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            text-decoration: none;
            background: linear-gradient(90deg, #ff2fcf, #7b2cff, #00d9ff);
            box-shadow: 0 0 16px rgba(0, 217, 255, .45);
        }

        .admin-panel {
            display: none;
            margin-top: 18px;
            gap: 12px;
            flex-direction: column;
        }

        .login-error {
            margin-top: 12px;
            color: #ffd966;
            min-height: 20px;
        }

        .admin-note {
            margin-top: 12px;
            font-size: 13px;
            color: #9bdfff;
            line-height: 1.5;
        }

        @media(max-width:700px) {
            .top-bar {
                flex-direction: column;
            }

            .menu-row {
                flex-direction: column;
                align-items: center;
            }

            .menu-row a {
                width: 240px;
            }
        }

        .storyTitle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .new-badge {
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #fff;
            background: linear-gradient(90deg, #ff3b3b, #ff9a00);
            animation: newPulse .9s infinite alternate;
            box-shadow: 0 0 10px rgba(255, 80, 80, .6);
        }

        @keyframes newPulse {
            from {
                transform: scale(1);
                opacity: .8;
            }

            to {
                transform: scale(1.15);
                opacity: 1;
            }
        }

        .storyWindow p a {
            color: #63eaff;
            font-weight: bold;
            text-decoration: underline;
            overflow-wrap: anywhere;
        }

        .storyWindow p a:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #00d9ff;
        }

        @keyframes bubblePop {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            20% {
                transform: scale(.9);
            }

            60% {
                transform: scale(1.2);
                opacity: .9;
            }

            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        .popParticle {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, #fff, #7de7ff, #00bfff);
            animation: particleFly .8s ease-out forwards;
        }

        @keyframes particleFly {
            from {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            to {
                transform:
                    translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }

        .storyBubble {
            transition:
                left .55s cubic-bezier(.22, 1, .36, 1),
                top .55s cubic-bezier(.22, 1, .36, 1),
                width .55s cubic-bezier(.22, 1, .36, 1),
                height .55s cubic-bezier(.22, 1, .36, 1),
                transform .3s ease,
                opacity .3s ease,
                border-radius .55s ease;
        }

        /* Bubble moves to center and grows */
        .storyBubble.bubble-expand {
            position: fixed;
            left: 50% !important;
            top: 50% !important;

            width: min(55vw, 500px);
            height: min(55vw, 500px);

            transform: translate(-50%, -50%);
            font-size: clamp(20px, 4vw, 42px);

            z-index: 1000;

            background:
                radial-gradient(circle at 30% 25%,
                    rgba(255, 255, 255, .95),
                    rgba(117, 231, 255, .55) 20%,
                    rgba(255, 83, 214, .35) 55%,
                    rgba(123, 44, 255, .45));

            box-shadow:
                0 0 40px rgba(255, 255, 255, .85),
                0 0 100px rgba(0, 217, 255, .75),
                0 0 160px rgba(255, 47, 207, .55);
        }

        /* Large pop animation */
        .storyBubble.bubble-big-pop {
            animation: bigBubblePop .55s ease forwards;
        }

        @keyframes bigBubblePop {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            25% {
                transform: translate(-50%, -50%) scale(.92);
            }

            55% {
                transform: translate(-50%, -50%) scale(1.15);
                filter: brightness(1.8);
            }

            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
                filter: brightness(3);
            }
        }

        /* Large bubble pieces */
        .large-pop-particle {
            position: fixed;
            left: 50%;
            top: 50%;

            width: var(--size);
            height: var(--size);

            border-radius: 50%;
            pointer-events: none;
            z-index: 1001;

            background:
                radial-gradient(circle at 30% 25%,
                    white,
                    rgba(126, 238, 255, .9) 25%,
                    rgba(255, 67, 207, .7) 65%,
                    transparent);

            box-shadow:
                0 0 18px rgba(255, 255, 255, .9),
                0 0 30px rgba(0, 217, 255, .7);

            animation: largeParticleFly 1s ease-out forwards;
        }

        @keyframes largeParticleFly {
            from {
                transform:
                    translate(-50%, -50%) rotate(0deg) scale(1);

                opacity: 1;
            }

            to {
                transform:
                    translate(calc(-50% + var(--move-x)),
                        calc(-50% + var(--move-y))) rotate(var(--rotate)) scale(0);

                opacity: 0;
            }
        }

        /* Story box enters from the clicked bubble location */
        .storyWindow.story-window-enter {
            animation: storyBoxEnter .65s cubic-bezier(.22, 1, .36, 1);
        }

        @keyframes storyBoxEnter {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(.2) rotate(-6deg);
                border-radius: 50%;
                filter: brightness(2);
            }

            60% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.04) rotate(1deg);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1) rotate(0);
                border-radius: 32px;
                filter: brightness(1);
            }
        }

        to {
            opacity: 1;
            transform:
                translate(-50%, -50%) scale(1);

            border-radius: 28px;
        }


        .storyCloseX {
            position: absolute;
            top: 16px;
            right: 18px;
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, .4);
            border-radius: 50%;
            background: linear-gradient(135deg,
                    rgba(255, 47, 207, .7),
                    rgba(123, 44, 255, .72),
                    rgba(0, 217, 255, .72));
            color: white;
            font-size: 30px;
            font-weight: 400;
            line-height: 1;
            cursor: pointer;
            box-shadow:
                0 0 18px rgba(255, 255, 255, .28),
                0 0 28px rgba(0, 217, 255, .32);
            transition: transform .25s ease, box-shadow .25s ease, filter .25s ease;
            z-index: 10;
        }

        .storyCloseX:hover {
            transform: rotate(90deg) scale(1.12);
            filter: brightness(1.2);
            box-shadow:
                0 0 22px rgba(255, 255, 255, .8),
                0 0 44px rgba(0, 217, 255, .65),
                0 0 55px rgba(255, 47, 207, .45);
        }

        @media screen and (max-width: 560px) {
            .storyWindow {
                width: calc(100vw - 28px);
                max-height: 74vh;
                padding: 60px 18px 20px;
                border-radius: 26px;
            }

            .storyWindow h2 {
                font-size: 25px;
            }

            .storyWindow p {
                padding: 14px;
                font-size: 15px;
            }
        }

        .storyWindow {
            transition:
                left .25s ease,
                top .25s ease,
                transform .25s ease;
        }
    </style>
</head>

<body>
    <header class="top-header">
        <nav class="top-nav">
            <a href="shop.html">Store</a>
            <a href="fun.html" aria-current="page">Fun</a>
            <a href="support.html">Support</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>

            <a href="index.html" class="nav-logo">
                <img src="logo/SMLOGOTRANSS.png" alt="CHAYNOVA Logo">
            </a>
        </nav>
    </header>

    <div id="musicPlayer">
        <div id="songTitle">Strawberry Elephant</div>
        <select id="songSelect"></select>
        <button id="musicBtn" type="button" aria-label="Play music">▶</button>

        <div id="volumeControl" role="slider" tabindex="0" aria-label="Music volume" aria-valuemin="0"
            aria-valuemax="100" aria-valuenow="35">
            <svg viewBox="0 0 100 55" aria-hidden="true">
                <path class="volume-track" d="M 8 8 Q 50 58 92 8"></path>
                <path id="volumeProgress" class="volume-progress" d="M 8 8 Q 50 58 92 8"></path>
                <circle id="volumeKnob" class="volume-knob" cx="37.4" cy="29.1" r="7"></circle>
            </svg>
            <span id="volumeValue">35%</span>
        </div>
    </div>

    <audio id="bgMusic"></audio>

    <div id="storyLayer"></div>

    <main>

        <img id="logo" src="logo/WHITEDYNAMICTRANS.png" alt="CHAYNOVA Logo">

        <section id="storyList">

            <h2>CHAYNOVA Updates</h2>

            <div id="storyButtons"></div>

        </section>

    </main>

    <footer>
        <footer><a href="about.html">© 2026 CHAYNOVA</a> • Inspired by Thailand • Based in New York
            <button class="hidden-admin-btn" onclick="openLogin()" title="Admin">•</button>
        </footer>

        <div id="loginOverlay" class="login-overlay" aria-hidden="true">
            <div class="login-box">

                <h2>CHAYNOVA Admin</h2>

                <div id="loginForm">
                    <input id="usernameInput" type="text" placeholder="Username" autocomplete="username">
                    <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password">

                    <div class="login-actions">
                        <button type="button" onclick="checkLogin()">Login</button>
                        <button type="button" onclick="closeLogin()">Cancel</button>
                    </div>

                    <div id="loginError" class="login-error"></div>

                    <div class="admin-note">
                        Login is checked by your Cloudflare Worker.
                    </div>
                </div>

                <div id="adminPanel" class="admin-panel">
                    <a href="admin-edit-post.html">Edit Fun</a>
                    <a href="fun.html">Open Fun</a>
                    <a href="index.html">Home</a>
                    <button class="logout-btn" type="button" onclick="logoutAdmin()">Logout</button>
                    <button class="logout-btn" type="button" onclick="closeLogin()">Close</button>
                </div>

            </div>
        </div>

        <script>

const balloonPopSound = new Audio("audio/bubblePopUp.mp3");
balloonPopSound.preload = "auto";
balloonPopSound.volume = 0.8;


            const songs = [
                {
                    title: "Strawberry Elephant one",
                    file: "audio/strawberryElephantE.mp3"
                },
                {
                    title: "I Miss You Every Day",
                    file: "audio/background.mp3"
                },
                {
                    title: "The 25th Floor",
                    file: "audio/the25thFloor.mp3"
                },
                {
                    title: "Love Defenders Do",
                    file: "audio/LoveDefendersDo.mp3"
                },
                {
                    title: "Strawberry Elephant Thai",
                    file: "audio/strawberryElephant.mp3"
                }
            ];

            const API = "https://chay1api.mikebewise.workers.dev";
            const ADMIN_TOKEN_KEY = "chaynovaAdminToken";

            let stories = [];

            const storyButtons = document.getElementById("storyButtons");

            function escapeHtml(value = "") {
                return String(value)
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;")
                    .replaceAll('"', "&quot;")
                    .replaceAll("'", "&#039;");
            }

            function makeLinksClickable(text = "") {
                const safeText = escapeHtml(text);

                return safeText.replace(
                    /(https?:\/\/[^\s<]+)/g,
                    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
                );
            }

            function imageUrl(imageName) {
                if (!imageName) return "";
                if (/^https?:\/\//i.test(imageName) || imageName.startsWith("data:")) {
                    return imageName;
                }
                return `${API}/image/${encodeURIComponent(imageName)}`;
            }

            function normalizeStory(item) {
                return {
                    id: item.id,
                    title: item.title || "Untitled",
                    text: item.story || "",
                    photo: imageUrl(item.image || ""),
                    position: Number(item.position || 0),
                    created_at: item.created_at || "",
                    updated_at: item.updated_at || item.created_at || ""
                };
            }

            function isAdminLoggedIn() {
                return Boolean(localStorage.getItem(ADMIN_TOKEN_KEY));
            }

            function openStoryEditor(storyId) {
                localStorage.setItem("chaynovaEditStoryId", String(storyId));
                window.location.href = `admin-edit-post.html?edit=${encodeURIComponent(storyId)}`;
            }

            async function deleteSavedStory(story) {
                if (!isAdminLoggedIn()) {
                    alert("Your admin login has expired. Please log in again.");
                    openLogin();
                    return;
                }

                const confirmed = confirm(`Delete “${story.title}”?`);
                if (!confirmed) return;

                try {
                    const response = await fetch(`${API}/story/${encodeURIComponent(story.id)}`, {
                        method: "DELETE",
                        headers: {
                            Authorization: `Bearer ${localStorage.getItem(ADMIN_TOKEN_KEY)}`
                        }
                    });

                    const message = await response.text();

                    if (response.status === 401 || response.status === 403) {
                        localStorage.removeItem(ADMIN_TOKEN_KEY);
                        updateAdminPanel();
                        throw new Error("Your admin login expired. Please log in again.");
                    }

                    if (!response.ok) {
                        throw new Error(message || "Could not delete the story.");
                    }

                    document.querySelector(".storyWindow")?.remove();
                    await loadSavedStories();
                } catch (error) {
                    alert(error.message || "Could not delete the story.");
                }
            }

            // Check if a story is new (created within the last 2 days) (2 * 24 * 60 * 60 * 1000)
            function isNewStory(createdAt) {
                if (!createdAt) return false;

                const created = new Date(createdAt);
                const now = new Date();

                return (now - created) < (1 * 24 * 60 * 60 * 1000); // 1 day
            }


            function renderStoryList() {
                storyButtons.innerHTML = "";

                if (!stories.length) {
                    storyButtons.innerHTML = `
            <div style="padding:18px;text-align:center;opacity:.85;">
                No saved stories yet.
            </div>
        `;
                    return;
                }

                const showAdminActions = isAdminLoggedIn();

                stories.forEach(story => {
                    const wrapper = document.createElement("div");
                    wrapper.className = "story-card-wrap";

                    const button = document.createElement("button");
                    button.className = "storyItem";

                    const previewText = story.text.length > 80
                        ? `${story.text.substring(0, 80)}...`
                        : story.text;

                    const imageHtml = story.photo
                        ? `<img class="storyThumb" src="${story.photo}" alt="${escapeHtml(story.title)}">`
                        : `<div class="storyThumb" style="display:grid;place-items:center;background:rgba(255,255,255,.12);">📖</div>`;

                    button.innerHTML = `
            ${imageHtml}
            <div>
                <div class="storyTitle">
    ${escapeHtml(story.title)}
    ${isNewStory(story.updated_at)
                            ? '<span class="new-badge">NEW</span>'
                            : ''}
</div>
                <div class="storyPreview">${escapeHtml(previewText)}</div>
            </div>
        `;

                    button.onclick = () => openStoryWindow(story);
                    wrapper.appendChild(button);

                    if (showAdminActions) {
                        const actions = document.createElement("div");
                        actions.className = "story-admin-actions";

                        const editButton = document.createElement("button");
                        editButton.type = "button";
                        editButton.textContent = "Edit";
                        editButton.onclick = () => openStoryEditor(story.id);

                        const deleteButton = document.createElement("button");
                        deleteButton.type = "button";
                        deleteButton.className = "delete-story-btn";
                        deleteButton.textContent = "Delete";
                        deleteButton.onclick = () => deleteSavedStory(story);

                        actions.append(editButton, deleteButton);
                        wrapper.appendChild(actions);
                    }

                    storyButtons.appendChild(wrapper);
                });
            }

            async function loadSavedStories() {
                storyButtons.innerHTML = `
        <div style="padding:18px;text-align:center;opacity:.85;">
            Loading saved stories...
        </div>
    `;

                try {
                    const response = await fetch(API, {
                        method: "GET",
                        cache: "no-store"
                    });

                    if (!response.ok) {
                        throw new Error("Could not load saved stories.");
                    }

                    const data = await response.json();

                    stories = (Array.isArray(data) ? data : [])
                        .map(normalizeStory)
                        .sort((a, b) =>
                            new Date(b.updated_at) - new Date(a.updated_at)
                        );

                    renderStoryList();
                } catch (error) {
                    console.error(error);
                    storyButtons.innerHTML = `
            <div style="padding:18px;text-align:center;color:#ffd966;">
                ${escapeHtml(error.message || "Could not load saved stories.")}
            </div>
        `;
                }
            }

            const music = document.getElementById("bgMusic");
            const musicBtn = document.getElementById("musicBtn");
            const songSelect = document.getElementById("songSelect");
            const songTitle = document.getElementById("songTitle");
            const storyLayer = document.getElementById("storyLayer");
            const volumeControl = document.getElementById("volumeControl");
            const volumeProgress = document.getElementById("volumeProgress");
            const volumeKnob = document.getElementById("volumeKnob");
            const volumeValue = document.getElementById("volumeValue");

            let currentSong = 0;
            const maxPopups = 3;

            music.volume = 0.69;

            const volumePath = volumeProgress;
            const volumePathLength = volumePath.getTotalLength();
            let currentVolume = music.volume;

            
            // Detect iPhone/iPad
            const isIOS =
                /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
                (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

            if (isIOS) {
                document.body.classList.add("iphone-device");

                // Use your preferred default volume
                currentVolume = 1.0;      // 100%
                music.volume = currentVolume;
            } else {
                currentVolume = 0.69;
                music.volume = currentVolume;
            }

            updateVolumeControl(currentVolume);

            function updateVolumeControl(volume) {
                currentVolume = Math.min(1, Math.max(0, volume));
                music.volume = currentVolume;

                const point = volumePath.getPointAtLength(volumePathLength * currentVolume);
                volumeKnob.setAttribute("cx", point.x);
                volumeKnob.setAttribute("cy", point.y);

                volumeProgress.style.strokeDasharray = `${volumePathLength}`;
                volumeProgress.style.strokeDashoffset =
                    `${volumePathLength * (1 - currentVolume)}`;

                const percentage = Math.round(currentVolume * 100);
                volumeValue.textContent = `${percentage}%`;
                volumeControl.setAttribute("aria-valuenow", percentage);
            }

            function setVolumeFromPointer(event) {
                const rect = volumeControl.getBoundingClientRect();
                const x = Math.min(rect.width, Math.max(0, event.clientX - rect.left));
                updateVolumeControl(x / rect.width);
            }

            volumeControl.addEventListener("pointerdown", event => {
                volumeControl.setPointerCapture(event.pointerId);
                setVolumeFromPointer(event);
            });

            volumeControl.addEventListener("pointermove", event => {
                if (volumeControl.hasPointerCapture(event.pointerId)) {
                    setVolumeFromPointer(event);
                }
            });

            volumeControl.addEventListener("keydown", event => {
                if (event.key === "ArrowRight" || event.key === "ArrowUp") {
                    event.preventDefault();
                    updateVolumeControl(currentVolume + 0.05);
                }

                if (event.key === "ArrowLeft" || event.key === "ArrowDown") {
                    event.preventDefault();
                    updateVolumeControl(currentVolume - 0.05);
                }

                if (event.key === "Home") {
                    event.preventDefault();
                    updateVolumeControl(0);
                }

                if (event.key === "End") {
                    event.preventDefault();
                    updateVolumeControl(1);
                }
            });

            updateVolumeControl(currentVolume);

            songs.forEach((song, index) => {
                const option = document.createElement("option");
                option.value = index;
                option.textContent = song.title;
                songSelect.appendChild(option);
            });

            function loadSong(index) {
                currentSong = index;
                music.src = songs[index].file;
                songTitle.textContent = songs[index].title;
                songSelect.value = index;
            }

            loadSong(currentSong);

            musicBtn.addEventListener("click", () => {
                if (music.paused) {
                    music.play()
                        .then(() => {
                            musicBtn.textContent = "❚❚";
                        })
                        .catch(() => {
                            musicBtn.textContent = "▶";
                        });
                } else {
                    music.pause();
                    musicBtn.textContent = "▶";
                }
            });

            songSelect.addEventListener("change", () => {
                const selectedSong = Number(songSelect.value);
                loadSong(selectedSong);

                music.play()
                    .then(() => {
                        musicBtn.textContent = "❚❚";
                    })
                    .catch(() => {
                        musicBtn.textContent = "▶";
                    });
            });

            music.addEventListener("ended", () => {
                currentSong = (currentSong + 1) % songs.length;
                loadSong(currentSong);
                music.play();
            });

            function showRandomStory() {
                if (!stories.length) return;

                const currentPopups = document.querySelectorAll(".storyBubble").length;

                if (currentPopups >= maxPopups) return;

                const story = stories[Math.floor(Math.random() * stories.length)];

                const bubble = document.createElement("button");
                bubble.className = "storyBubble";
                bubble.textContent = story.title;

                const bubbleSize = 74;
                const safeTop = 170;
                const safeBottom = 90;

                const maxX = window.innerWidth - bubbleSize - 20;
                const maxY = window.innerHeight - bubbleSize - safeBottom;

                const x = 20 + Math.random() * Math.max(0, maxX - 20);
                const y = safeTop + Math.random() * Math.max(0, maxY - safeTop);

                bubble.style.left = `${x}px`;
                bubble.style.top = `${y}px`;

                bubble.addEventListener("click", () => {
                    expandBubbleToStory(bubble, story);
                });

                storyLayer.appendChild(bubble);

                setTimeout(() => {
                    bubble.remove();
                }, 9000);
            }

            let bubbleIsOpening = false;

            function expandBubbleToStory(bubble, story) {
                if (bubbleIsOpening) return;

                bubbleIsOpening = true;
                bubble.disabled = true;

                // Save the original clicked bubble position before it moves.
                const clickedRect = bubble.getBoundingClientRect();
                const clickedPosition = {
                    x: clickedRect.left + clickedRect.width / 2,
                    y: clickedRect.top + clickedRect.height / 2
                };

                bubble.classList.add("bubble-expand");

                setTimeout(() => {
    createLargeBubbleExplosion();

    balloonPopSound.currentTime = 0;

    balloonPopSound.play().catch(error => {
        console.log("Pop sound could not play:", error);
    });

    bubble.classList.add("bubble-big-pop");

                    setTimeout(() => {
                        bubble.remove();
                        openStoryWindow(story, clickedPosition);

                        const storyWindow = document.querySelector(".storyWindow");
                        if (storyWindow) {
                            storyWindow.classList.add("story-window-enter");
                        }

                        bubbleIsOpening = false;
                    }, 1000);
                }, 1200);
            }

            function createLargeBubbleExplosion() {
                const particleCount = 36;

                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement("span");

                    particle.className = "large-pop-particle";

                    const angle =
                        (Math.PI * 2 * i) / particleCount +
                        Math.random() * .25;

                    const distance =
                        Math.min(window.innerWidth, window.innerHeight)
                        * (.22 + Math.random() * .3);

                    const moveX =
                        Math.cos(angle) * distance;

                    const moveY =
                        Math.sin(angle) * distance;

                    const size =
                        10 + Math.random() * 32;

                    const rotation =
                        -360 + Math.random() * 720;

                    particle.style.setProperty(
                        "--move-x",
                        `${moveX}px`
                    );

                    particle.style.setProperty(
                        "--move-y",
                        `${moveY}px`
                    );

                    particle.style.setProperty(
                        "--size",
                        `${size}px`
                    );

                    particle.style.setProperty(
                        "--rotate",
                        `${rotation}deg`
                    );

                    document.body.appendChild(particle);

                    particle.addEventListener(
                        "animationend",
                        () => particle.remove(),
                        { once: true }
                    );
                }
            }

            function openStoryWindow(story, clickedPosition = null) {
                document.querySelector(".storyWindow")?.remove();

                const storyWindow = document.createElement("div");
                storyWindow.className = "storyWindow";

                // Put the popup between the clicked bubble and screen center.
                if (clickedPosition) {
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight / 2;
                    const factor = 0.68;

                    let popupX = clickedPosition.x + (centerX - clickedPosition.x) * factor;
                    let popupY = clickedPosition.y + (centerY - clickedPosition.y) * factor;

                    // Keep the popup safely inside the screen.
                    const estimatedHalfWidth = Math.min(window.innerWidth * 0.46, 310);
                    const estimatedHalfHeight = Math.min(window.innerHeight * 0.39, 300);
                    const margin = 16;

                    popupX = Math.max(
                        estimatedHalfWidth + margin,
                        Math.min(window.innerWidth - estimatedHalfWidth - margin, popupX)
                    );

                    popupY = Math.max(
                        estimatedHalfHeight + margin,
                        Math.min(window.innerHeight - estimatedHalfHeight - margin, popupY)
                    );

                    storyWindow.style.left = `${popupX}px`;
                    storyWindow.style.top = `${popupY}px`;
                }

                const storyImage = story.photo
                    ? `<img class="storyPhoto" src="${story.photo}" alt="${escapeHtml(story.title)}">`
                    : "";

                const adminButtons = isAdminLoggedIn()
                    ? `
                        <div class="story-window-admin">
                            <button type="button" class="edit-story-btn">Edit</button>
                            <button type="button" class="delete-story-btn">Delete</button>
                        </div>
                    `
                    : "";

                storyWindow.innerHTML = `
                    <button type="button" class="storyCloseX" aria-label="Close story">&times;</button>
                    ${storyImage}
                    <h2>${escapeHtml(story.title)}</h2>
                    <p>${makeLinksClickable(story.text)}</p>
                    ${adminButtons}
                `;

                storyWindow.querySelector(".storyCloseX").addEventListener("click", () => {
                    storyWindow.remove();
                });

                const editButton = storyWindow.querySelector(".edit-story-btn");
                if (editButton) {
                    editButton.addEventListener("click", () => openStoryEditor(story.id));
                }

                const deleteButton = storyWindow.querySelector(".delete-story-btn");
                if (deleteButton) {
                    deleteButton.addEventListener("click", () => deleteSavedStory(story));
                }

                document.body.appendChild(storyWindow);
                makePopupDraggable(storyWindow);
            }

            function openLogin() {
                const overlay = document.getElementById("loginOverlay");
                overlay.style.display = "flex";
                overlay.setAttribute("aria-hidden", "false");
                document.getElementById("loginError").innerText = "";
                updateAdminPanel();

                setTimeout(() => {
                    const usernameInput = document.getElementById("usernameInput");
                    if (usernameInput && usernameInput.offsetParent !== null) {
                        usernameInput.focus();
                    }
                }, 100);
            }

            function closeLogin() {
                const overlay = document.getElementById("loginOverlay");
                overlay.style.display = "none";
                overlay.setAttribute("aria-hidden", "true");
                document.getElementById("loginError").innerText = "";
            }

            async function checkLogin() {
                const usernameInput = document.getElementById("usernameInput");
                const passwordInput = document.getElementById("passwordInput");
                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                const errorBox = document.getElementById("loginError");

                if (!username || !password) {
                    errorBox.innerText = "Please enter username and password.";
                    return;
                }

                errorBox.innerText = "Checking login...";

                try {
                    const response = await fetch(`${API}/login`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ username, password })
                    });

                    let data = {};
                    try {
                        data = await response.json();
                    } catch (_) {
                        throw new Error("The login API returned an invalid response.");
                    }

                    if (response.ok && data.success && data.token) {
                        localStorage.setItem(ADMIN_TOKEN_KEY, data.token);
                        passwordInput.value = "";
                        errorBox.innerText = "";
                        updateAdminPanel();
                        renderStoryList();
                    } else {
                        localStorage.removeItem(ADMIN_TOKEN_KEY);
                        updateAdminPanel();
                        errorBox.innerText = data.message || "Wrong username or password.";
                    }
                } catch (error) {
                    localStorage.removeItem(ADMIN_TOKEN_KEY);
                    updateAdminPanel();
                    errorBox.innerText = error.message || "Login failed. Check your Worker API.";
                }
            }

            function updateAdminPanel() {
                const token = localStorage.getItem(ADMIN_TOKEN_KEY);
                const loginForm = document.getElementById("loginForm");
                const adminPanel = document.getElementById("adminPanel");

                if (token) {
                    loginForm.style.display = "none";
                    adminPanel.style.display = "flex";
                } else {
                    loginForm.style.display = "block";
                    adminPanel.style.display = "none";
                }
            }

            function logoutAdmin() {
                localStorage.removeItem(ADMIN_TOKEN_KEY);
                document.getElementById("usernameInput").value = "";
                document.getElementById("passwordInput").value = "";
                document.getElementById("loginError").innerText = "";
                updateAdminPanel();
                renderStoryList();
            }

            document.getElementById("passwordInput").addEventListener("keydown", function (e) {
                if (e.key === "Enter") {
                    checkLogin();
                }
            });

            document.getElementById("usernameInput").addEventListener("keydown", function (e) {
                if (e.key === "Enter") {
                    document.getElementById("passwordInput").focus();
                }
            });

            document.getElementById("loginOverlay").addEventListener("click", function (e) {
                if (e.target === this) {
                    closeLogin();
                }
            });

            window.addEventListener("keydown", function (e) {
                if (e.key === "Escape") {
                    closeLogin();
                }
            });

            window.openLogin = openLogin;
            window.closeLogin = closeLogin;
            window.checkLogin = checkLogin;
            window.logoutAdmin = logoutAdmin;

            updateAdminPanel();
            loadSavedStories();

            setInterval(showRandomStory, 3000);

            function popBubble(bubble, story) {

                const rect = bubble.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;

                // create particles
                for (let i = 0; i < 18; i++) {

                    const p = document.createElement("div");
                    p.className = "popParticle";

                    p.style.left = (cx - 6) + "px";
                    p.style.top = (cy - 6) + "px";

                    const angle = Math.random() * Math.PI * 2;
                    const distance = 40 + Math.random() * 80;

                    p.style.setProperty("--dx",
                        Math.cos(angle) * distance + "px");

                    p.style.setProperty("--dy",
                        Math.sin(angle) * distance + "px");

                    document.body.appendChild(p);

                    p.addEventListener("animationend", () => {
                        p.remove();
                    });
                }

                bubble.style.animation = "bubblePop .35s forwards";

                bubble.addEventListener("animationend", () => {
                    bubble.remove();
                    openStoryWindow(story);
                }, { once: true });
            }

            function makePopupDraggable(popup) {

                let dragging = false;
                let startX = 0;
                let startY = 0;

                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;

                const LIMIT = 80;   // movement distance

                popup.style.cursor = "grab";

                popup.addEventListener("pointerdown", e => {

                    if (
                        e.target.closest(".storyCloseX") ||
                        e.target.closest("button") ||
                        e.target.closest("a")
                    ) return;

                    dragging = true;

                    popup.style.cursor = "grabbing";

                    startX = e.clientX;
                    startY = e.clientY;

                    popup.setPointerCapture(e.pointerId);

                });

                popup.addEventListener("pointermove", e => {

                    if (!dragging) return;

                    let dx = e.clientX - startX;
                    let dy = e.clientY - startY;

                    dx = Math.max(-LIMIT, Math.min(LIMIT, dx));
                    dy = Math.max(-LIMIT, Math.min(LIMIT, dy));

                    popup.style.left = `${centerX + dx}px`;
                    popup.style.top = `${centerY + dy}px`;

                });

                popup.addEventListener("pointerup", () => {

                    dragging = false;
                    popup.style.left = "50%";
                    popup.style.top = "50%";
                    popup.style.cursor = "grab";

                });

            }


        </script>
</body>

</html>
