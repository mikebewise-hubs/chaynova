```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Fun time | CHAYNOVA</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 20% 20%, #ff4fa3 0%, transparent 30%),
        radial-gradient(circle at 80% 25%, #38cfff 0%, transparent 30%),
        radial-gradient(circle at 50% 90%, #7d4dff 0%, transparent 35%),
        linear-gradient(135deg, #151049, #511675, #122c69);
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      isolation: isolate;
    }

    /* Animated background grid */
    .grid {
      position: absolute;
      inset: 0;
      z-index: -5;
      opacity: 0.18;
      background-image:
        linear-gradient(rgba(255,255,255,0.13) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.13) 1px, transparent 1px);
      background-size: 55px 55px;
      animation: moveGrid 12s linear infinite;
    }

    @keyframes moveGrid {
      from {
        background-position: 0 0;
      }

      to {
        background-position: 55px 55px;
      }
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 10;
      width: min(100%, 1100px);
      text-align: center;
    }

    h1 {
      margin-bottom: 12px;
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 900;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: white;
      text-shadow:
        0 0 8px #fff,
        0 0 20px #ff56be,
        0 0 45px #5fe7ff;
      animation: titleBounce 2.2s ease-in-out infinite;
    }

    @keyframes titleBounce {
      0%, 100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-12px) scale(1.04);
      }
    }

    .subtitle {
      margin-bottom: 28px;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: bold;
      letter-spacing: 4px;
      color: #fff6a6;
      text-transform: uppercase;
      animation: subtitleGlow 1.5s alternate infinite;
    }

    @keyframes subtitleGlow {
      from {
        opacity: 0.7;
        text-shadow: 0 0 5px #fff6a6;
      }

      to {
        opacity: 1;
        text-shadow:
          0 0 12px #fff6a6,
          0 0 25px #ff8ad4;
      }
    }

    /* Image card */
    .image-card {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(90vw, 650px);
      padding: 12px;
      border-radius: 35px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.32),
        rgba(255,255,255,0.06)
      );
      border: 2px solid rgba(255,255,255,0.5);
      box-shadow:
        0 25px 70px rgba(0,0,0,0.4),
        0 0 45px rgba(90,230,255,0.45),
        0 0 80px rgba(255,70,180,0.25);
      backdrop-filter: blur(14px);
      animation: cardFloat 4s ease-in-out infinite;
    }

    @keyframes cardFloat {
      0%, 100% {
        transform: translateY(0) rotate(-1deg);
      }

      50% {
        transform: translateY(-18px) rotate(1deg);
      }
    }

    .image-card::before {
      content: "";
      position: absolute;
      inset: -8px;
      z-index: -1;
      border-radius: 40px;
      background: linear-gradient(
        45deg,
        #ff4fa3,
        #ffe65c,
        #46eaff,
        #9658ff,
        #ff4fa3
      );
      background-size: 300% 300%;
      filter: blur(12px);
      opacity: 0.8;
      animation: borderFlow 5s linear infinite;
    }

    @keyframes borderFlow {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .main-image {
      display: block;
      width: 100%;
      max-height: 60vh;
      object-fit: contain;
      border-radius: 25px;
      animation: imagePulse 3s ease-in-out infinite;
    }

    @keyframes imagePulse {
      0%, 100% {
        filter: brightness(1) saturate(1);
      }

      50% {
        filter: brightness(1.12) saturate(1.25);
      }
    }

    /* Rotating rings behind image */
    .ring {
      position: absolute;
      left: 50%;
      top: 56%;
      z-index: -2;
      border: 4px dashed rgba(255,255,255,0.4);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .ring-one {
      width: 720px;
      height: 720px;
      animation: spin 20s linear infinite;
    }

    .ring-two {
      width: 830px;
      height: 830px;
      border-color: rgba(255,224,90,0.35);
      animation: spinReverse 28s linear infinite;
    }

    @keyframes spin {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    @keyframes spinReverse {
      from {
        transform: translate(-50%, -50%) rotate(360deg);
      }

      to {
        transform: translate(-50%, -50%) rotate(0deg);
      }
    }

    /* Floating bubbles */
    .bubble {
      position: absolute;
      bottom: -120px;
      z-index: 1;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.35);
      box-shadow:
        inset 0 0 20px rgba(255,255,255,0.25),
        0 0 18px rgba(88,225,255,0.25);
      animation: bubbleRise linear infinite;
    }

    @keyframes bubbleRise {
      0% {
        transform: translateY(0) translateX(0) scale(0.7);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      50% {
        transform: translateY(-55vh) translateX(35px) scale(1);
      }

      100% {
        transform: translateY(-120vh) translateX(-25px) scale(1.2);
        opacity: 0;
      }
    }

    /* Stars */
    .star {
      position: absolute;
      z-index: 3;
      color: #fff5a0;
      font-size: 30px;
      text-shadow:
        0 0 8px white,
        0 0 18px #ffdf3e;
      animation: twinkle 1.4s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from {
        opacity: 0.25;
        transform: scale(0.7) rotate(0deg);
      }

      to {
        opacity: 1;
        transform: scale(1.25) rotate(25deg);
      }
    }

    /* Floating shapes */
    .shape {
      position: absolute;
      z-index: 2;
      animation: shapeFloat 6s ease-in-out infinite;
    }

    .circle {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffdf4d, #ff669d);
      box-shadow: 0 0 25px rgba(255,112,167,0.65);
    }

    .square {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #50efff, #665cff);
      box-shadow: 0 0 25px rgba(80,239,255,0.65);
    }

    .triangle {
      width: 0;
      height: 0;
      border-left: 34px solid transparent;
      border-right: 34px solid transparent;
      border-bottom: 62px solid #9aff6b;
      filter: drop-shadow(0 0 14px rgba(154,255,107,0.7));
    }

    @keyframes shapeFloat {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-35px) rotate(180deg);
      }
    }

    /* Confetti */
    .confetti {
      position: absolute;
      top: -30px;
      z-index: 4;
      width: 10px;
      height: 18px;
      border-radius: 3px;
      animation: confettiFall linear infinite;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(115vh) rotate(720deg);
        opacity: 0.3;
      }
    }

    /* Decorative emojis */
    .emoji {
      position: absolute;
      z-index: 8;
      font-size: clamp(2rem, 5vw, 4rem);
      filter: drop-shadow(0 8px 8px rgba(0,0,0,0.3));
      animation: emojiDance 2.8s ease-in-out infinite;
    }

    @keyframes emojiDance {
      0%, 100% {
        transform: translateY(0) rotate(-12deg);
      }

      50% {
        transform: translateY(-25px) rotate(12deg) scale(1.15);
      }
    }

    .emoji-one {
      left: 5%;
      top: 20%;
    }

    .emoji-two {
      right: 6%;
      top: 18%;
      animation-delay: 0.5s;
    }

    .emoji-three {
      left: 8%;
      bottom: 12%;
      animation-delay: 1s;
    }

    .emoji-four {
      right: 7%;
      bottom: 13%;
      animation-delay: 1.5s;
    }

    /* Responsive adjustments */
    @media (max-width: 700px) {
      body {
        overflow-y: auto;
      }

      .page {
        min-height: 100svh;
        padding: 25px 15px;
      }

      h1 {
        letter-spacing: 2px;
      }

      .subtitle {
        letter-spacing: 2px;
      }

      .ring-one {
        width: 480px;
        height: 480px;
      }

      .ring-two {
        width: 570px;
        height: 570px;
      }

      .emoji {
        opacity: 0.85;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="grid"></div>

    <div class="ring ring-one"></div>
    <div class="ring ring-two"></div>

    <div class="emoji emoji-one">🎉</div>
    <div class="emoji emoji-two">🎮</div>
    <div class="emoji emoji-three">🎵</div>
    <div class="emoji emoji-four">🚀</div>

    <div class="shape circle" style="left: 4%; top: 48%;"></div>
    <div class="shape square" style="right: 5%; top: 48%; animation-delay: 1s;"></div>
    <div class="shape triangle" style="left: 18%; bottom: 5%; animation-delay: 2s;"></div>

    <span class="star" style="left: 13%; top: 12%;">★</span>
    <span class="star" style="right: 15%; top: 35%; animation-delay: .4s;">✦</span>
    <span class="star" style="left: 24%; bottom: 13%; animation-delay: .8s;">✧</span>
    <span class="star" style="right: 24%; bottom: 8%; animation-delay: 1.1s;">★</span>

    <section class="content">
      <h1>Fun Time</h1>
      <p class="subtitle">Play • Learn • Smile</p>

      <div class="image-card">
        <img
          class="main-image"
          src="images/funtime.png"
          alt="Fun Time"
        />
      </div>
    </section>

    <div id="bubbles"></div>
    <div id="confetti"></div>
  </main>

  <script>
    const bubbleContainer = document.getElementById("bubbles");
    const confettiContainer = document.getElementById("confetti");

    // Create animated bubbles
    for (let i = 0; i < 18; i++) {
      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const size = Math.random() * 70 + 20;

      bubble.style.width = `${size}px`;
      bubble.style.height = `${size}px`;
      bubble.style.left = `${Math.random() * 100}%`;
      bubble.style.animationDuration = `${Math.random() * 8 + 7}s`;
      bubble.style.animationDelay = `${Math.random() * 8}s`;

      bubbleContainer.appendChild(bubble);
    }

    // Create falling confetti
    const confettiColors = [
      "#ff4fa3",
      "#ffe45e",
      "#4beeff",
      "#8d5cff",
      "#75ff82",
      "#ff8d4d"
    ];

    for (let i = 0; i < 60; i++) {
      const confetti = document.createElement("div");
      confetti.className = "confetti";

      confetti.style.left = `${Math.random() * 100}%`;
      confetti.style.background =
        confettiColors[Math.floor(Math.random() * confettiColors.length)];
      confetti.style.animationDuration = `${Math.random() * 5 + 5}s`;
      confetti.style.animationDelay = `${Math.random() * 8}s`;
      confetti.style.transform = `rotate(${Math.random() * 360}deg)`;

      confettiContainer.appendChild(confetti);
    }
  </script>
</body>
</html>
