<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAYNOVA</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow-x:hidden;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    background:
        radial-gradient(circle at 20% 20%, rgba(255, 204, 0, 0.4), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(0,200,255,.4), transparent 30%),
        linear-gradient(135deg,#da7b06,#7864eb,#72a1f8);
}

/* BACKGROUND */
.stars{
    position:fixed;
    inset:0;
    pointer-events:none;
}

.firework{
    position:absolute;
    width:8px;
    height:8px;
    border-radius:50%;
    animation:explode 2.8s infinite ease-out;
    opacity:0;
    pointer-events:none;
}

.firework:nth-child(1){
    left:18%;
    top:20%;
    background:#ff2fcf;
}

.firework:nth-child(2){
    left:78%;
    top:18%;
    background:#00d9ff;
    animation-delay:.8s;
}

.firework:nth-child(3){
    left:50%;
    top:30%;
    background:#ffaa00;
    animation-delay:1.4s;
}

/* START SCREEN */
.start-screen{
    position:fixed;
    inset:0;
    z-index:100;
    background:rgba(0,0,20,.88);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    cursor:pointer;
    transition:opacity .8s ease;
}

.start-screen.hide{
    opacity:0;
    pointer-events:none;
}

.start-logo,
.main-logo{
    width:min(320px,80vw);
    height:auto;
    margin:28px 0;
    filter:
        drop-shadow(0 0 10px rgba(255,255,255,.35))
        drop-shadow(0 0 25px rgba(0,217,255,.45));
    animation:logoFloat 3s ease-in-out infinite;
}

.start-text{
    font-size:clamp(1.8rem,8vw,3rem);
    font-weight:bold;
    text-shadow:0 0 25px #00d9ff;
    animation:pulse 1.5s infinite;
}

.tap-text{
    margin-top:18px;
    color:#d6f7ff;
}

/* MAIN */
.container{
    position:relative;
    z-index:5;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
    opacity:0;
    transition:opacity .8s ease;
}

.container.show{
    opacity:1;
}

/* MENU */
.menu-bar{
    margin-top:20px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:16px;
}

.menu-bar a{
    font-family: "Oxanium", sans-serif !important;
    position:relative;
    overflow:hidden;
    min-width:145px;
    padding:14px 22px;
    text-align:center;
    text-decoration:none;
    font-size:1rem;
    font-weight:700;
    letter-spacing:.6px;
    color:black;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.25);
    background:linear-gradient(
        135deg,
        rgba(249, 87, 211, 0.35),
        rgba(168, 125, 244, 0.35),
        rgba(114, 225, 245, 0.35)
    );
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    box-shadow:
        0 0 18px rgba(0,217,255,.35),
        inset 0 0 15px rgba(255,255,255,.08);
    cursor:pointer;
    transition:.35s ease;
}

.menu-bar a::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:60%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.6),
        transparent
    );
    transform:skewX(-25deg);
    transition:.75s;
}

.menu-bar a:hover::before{
    left:160%;
}

.menu-bar a:hover{
    transform:translateY(-4px) scale(1.05);
    background:linear-gradient(135deg,#f977db,#9c67f7,#70e0f4);
    box-shadow:
        0 0 20px #efe8ea,
        0 0 35px #1554f3,
        0 0 50px #b5ebf4;
}

.menu-bar a:active{
    transform:scale(.96);
}

/* MUSIC BUTTON */
.music-btn{
    position:fixed;
    right:18px;
    bottom:calc(22px + env(safe-area-inset-bottom));
    width:56px;
    height:56px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    font-size:24px;
    color:white;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.25);
    box-shadow:
        0 0 18px rgba(0,217,255,.45),
        inset 0 0 10px rgba(255,255,255,.15);
    transition:.25s;
    z-index:90;
}

.music-btn:hover{
    transform:scale(1.12);
}

.music-btn:active{
    transform:scale(.92);
}

/* FOOTER */
.site-footer{
    position:fixed;
    left:0;
    right:0;
    bottom:10px;
    z-index:80;
    text-align:center;
    color:#9bdfff;
    font-size:14px;
    opacity:0;
    transition:opacity .8s ease;
    padding-bottom:env(safe-area-inset-bottom);
}

.site-footer.show{
    opacity:1;
}

.hidden-admin-btn{
    width:18px;
    height:18px;
    margin-left:6px;
    border:none;
    border-radius:50%;
    background:transparent;
    color:rgba(255,255,255,.08);
    cursor:pointer;
}

.hidden-admin-btn:hover{
    color:#00d9ff;
    text-shadow:0 0 12px #00d9ff;
}

/* LOGIN */
.login-overlay{
    display:none;
    position:fixed;
    inset:0;
    z-index:200;
    background:rgba(0,0,20,.82);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-box{
    width:min(92vw,420px);
    padding:28px;
    border-radius:24px;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.25);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    box-shadow:0 0 35px rgba(0,217,255,.4);
    text-align:center;
}

.login-box h2{
    color:#8ef2ff;
    margin-bottom:18px;
}

.login-box input{
    width:100%;
    margin:10px 0;
    padding:14px;
    border:none;
    border-radius:14px;
    outline:none;
    font-size:16px;
}

.login-actions{
    display:flex;
    gap:12px;
    margin-top:16px;
}

.login-actions button,
.admin-panel a,
.logout-btn{
    flex:1;
    padding:14px;
    border:none;
    border-radius:14px;
    color:white;
    font-weight:bold;
    text-decoration:none;
    cursor:pointer;
    background:linear-gradient(135deg,#ff2fcf,#7b2cff,#00d9ff);
}

.admin-panel{
    display:none;
    margin-top:18px;
    gap:12px;
    flex-direction:column;
}

.login-error{
    margin-top:12px;
    color:#ffd966;
    min-height:20px;
}

.admin-note{
    margin-top:12px;
    font-size:13px;
    color:#9bdfff;
    line-height:1.5;
}

/* ANIMATIONS */
@keyframes twinkle{
    from{opacity:.3;}
    to{opacity:.9;}
}

@keyframes pulse{
    0%,100%{transform:scale(1);opacity:.75;}
    50%{transform:scale(1.06);opacity:1;}
}

@keyframes logoFloat{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

@keyframes explode{
    0%{
        opacity:1;
        box-shadow:0 0 0 currentColor;
    }

    70%{
        opacity:1;
        box-shadow:
            0 -80px currentColor,
            60px -60px currentColor,
            80px 0 currentColor,
            60px 60px currentColor,
            0 80px currentColor,
            -60px 60px currentColor,
            -80px 0 currentColor,
            -60px -60px currentColor;
    }

    100%{
        opacity:0;
    }
}

/* MOBILE */
@media screen and (max-width:768px){
    .menu-bar{
        flex-direction:column;
        align-items:stretch;
        width:100%;
        max-width:360px;
    }

    .menu-bar a{
        width:100%;
        min-width:0;
        padding:16px;
    }

    .login-actions{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="audio/background.mp3" type="audio/mpeg">
</audio>

<div class="start-screen" id="startScreen">
    <div class="start-text"> </div>

    <img
        src="logo/WHITEDYNAMICTRANS.png"
        alt="CHAYNOVA Logo"
        class="start-logo"
    >

    <div class="tap-text">Tap anywhere to begin</div>
</div>

<div class="stars"></div>

<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>

<main class="container" id="mainContent">
    <img
        src="logo/DYNAMICTRANS.png"
        alt="CHAYNOVA Logo"
        class="main-logo"
    >

    <div class="menu-bar">
        <a href="story.html">Vibe Story</a>
        <a href="game.html">Play Zone</a>
        <a href="music.html">Beats</a>
        <a href="video.html">Watch</a>
    </div>
</main>

<button id="musicBtn" class="music-btn" title="Pause Music">🔊</button>

<footer class="site-footer" id="siteFooter">
    © 2026 CHAYNOVA
    <button class="hidden-admin-btn" onclick="openLogin()" title="Admin">•</button>
</footer>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">

        <h2>CHAYNOVA Admin</h2>

        <div id="loginForm">
            <input id="usernameInput" type="text" placeholder="Username" autocomplete="username">
            <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password">

            <div class="login-actions">
                <button onclick="checkLogin()">Login</button>
                <button onclick="closeLogin()">Cancel</button>
            </div>

            <div id="loginError" class="login-error"></div>

            <div class="admin-note">
                Login is checked by your Cloudflare Worker. Your password is not inside this HTML.
            </div>
        </div>

        <div id="adminPanel" class="admin-panel">
            <a href="story-admin.html">Post New Story</a>
            <a href="story.html?admin=1">Open Story Admin View</a>
            <button class="logout-btn" onclick="logoutAdmin()">Logout</button>
            <button class="logout-btn" onclick="closeLogin()">Close</button>
        </div>

    </div>
</div>

<script>
const API = "https://chay1api.mikebewise.workers.dev";

const startScreen = document.getElementById("startScreen");
const mainContent = document.getElementById("mainContent");
const music = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");
const siteFooter = document.getElementById("siteFooter");

startScreen.addEventListener("click", () => {
    music.volume = 0.35;

    music.play().catch(() => {
        console.log("Music could not start.");
    });

    startScreen.classList.add("hide");
    mainContent.classList.add("show");
    siteFooter.classList.add("show");

    musicBtn.innerHTML = "🔊";
    musicBtn.title = "Pause Music";
});

musicBtn.addEventListener("click", (e) => {
    e.stopPropagation();

    if(music.paused){
        music.play();
        musicBtn.innerHTML = "🔊";
        musicBtn.title = "Pause Music";
    }else{
        music.pause();
        musicBtn.innerHTML = "🔇";
        musicBtn.title = "Play Music";
    }
});

function openLogin(){
    document.getElementById("loginOverlay").style.display = "flex";
    updateAdminPanel();

    setTimeout(() => {
        const usernameInput = document.getElementById("usernameInput");
        if(usernameInput && usernameInput.offsetParent !== null){
            usernameInput.focus();
        }
    }, 100);
}

function closeLogin(){
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("loginError").innerText = "";
}

async function checkLogin(){
    const username = document.getElementById("usernameInput").value.trim();
    const password = document.getElementById("passwordInput").value.trim();
    const errorBox = document.getElementById("loginError");

    if(!username || !password){
        errorBox.innerText = "Please enter username and password.";
        return;
    }

    errorBox.innerText = "Checking login...";

    try{
        const response = await fetch(API + "/login", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username:username,
                password:password
            })
        });

        const data = await response.json();

        if(response.ok && data.success && data.token){
            localStorage.setItem("chaynovaAdminToken", data.token);
            errorBox.innerText = "";
            updateAdminPanel();
        }else{
            localStorage.removeItem("chaynovaAdminToken");
            errorBox.innerText = "Wrong username or password.";
        }

    }catch(error){
        errorBox.innerText = "Login failed. Check your Worker API.";
    }
}

function updateAdminPanel(){
    const token = localStorage.getItem("chaynovaAdminToken");

    if(token){
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("adminPanel").style.display = "flex";
    }else{
        document.getElementById("loginForm").style.display = "block";
        document.getElementById("adminPanel").style.display = "none";
    }
}

function logoutAdmin(){
    localStorage.removeItem("chaynovaAdminToken");
    document.getElementById("usernameInput").value = "";
    document.getElementById("passwordInput").value = "";
    updateAdminPanel();
}

document.getElementById("passwordInput").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        checkLogin();
    }
});

document.getElementById("usernameInput").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        document.getElementById("passwordInput").focus();
    }
});

window.addEventListener("keydown", function(e){
    if(e.key === "Escape"){
        closeLogin();
    }
});
</script>

</body>
</html>
