<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHAYNOVA - Coming Soon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 20% 16%, rgba(255, 0, 170, 0.45), transparent 25%),
        radial-gradient(circle at 80% 15%, rgba(0, 140, 255, 0.45), transparent 26%),
        radial-gradient(circle at 50% 70%, rgba(170, 0, 255, 0.45), transparent 38%),
        linear-gradient(135deg, #030010, #080033 45%, #001234);
      color: white;
    }

    .stars {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(rgba(255,255,255,.75) 1px, transparent 1px);
      background-size: 80px 80px, 135px 135px;
      animation: twinkle 5s infinite alternate;
      opacity: 0.65;
    }

    @keyframes twinkle {
      from { opacity: 0.35; transform: scale(1); }
      to { opacity: 0.85; transform: scale(1.04); }
    }

    .container {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 25px;
      flex-direction: column;
    }

    .title {
      font-size: clamp(3.3rem, 12vw, 8.8rem);
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(90deg, #ffb000, #ff2fcf, #8538ff, #00d9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-stroke: 2px rgba(255,255,255,0.6);
      text-shadow:
        0 3px 0 rgba(0,0,0,0.45),
        0 0 9px rgba(255, 47, 207, 0.45);
      animation: titleGlow 2.5s ease-in-out infinite alternate, float 4s ease-in-out infinite;
    }

    @keyframes titleGlow {
      from { filter: drop-shadow(0 0 4px #ff2fcf); }
      to { filter: drop-shadow(0 0 10px #00d9ff); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-12px) scale(1.025); }
    }

    .orbit {
      width: min(86vw, 980px);
      height: 150px;
      border: 3px solid rgba(255,255,255,0.13);
      border-top-color: #ff2fcf;
      border-bottom-color: #00d9ff;
      border-radius: 50%;
      position: absolute;
      top: 44%;
      animation: spinOrbit 7s linear infinite;
      box-shadow:
        0 0 32px rgba(255, 47, 207, 0.5),
        inset 0 0 28px rgba(0, 217, 255, 0.3);
    }

    @keyframes spinOrbit {
      from { transform: rotate(-8deg); }
      to { transform: rotate(352deg); }
    }

    .message-wrap {
      margin-top: 36px;
      position: relative;
      padding: 18px 28px;
      border-radius: 24px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow:
        0 0 25px rgba(255, 47, 207, 0.25),
        inset 0 0 25px rgba(0, 217, 255, 0.08);
      backdrop-filter: blur(6px);
      animation: messageFloat 3.5s ease-in-out infinite;
    }

    .message-wrap::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 26px;
      background: linear-gradient(90deg, #ff2fcf, #ffb000, #00d9ff, #7b2cff, #ff2fcf);
      background-size: 300% 300%;
      z-index: -1;
      filter: blur(10px);
      opacity: 0.6;
      animation: borderMove 4s linear infinite;
    }

    @keyframes borderMove {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    @keyframes messageFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .message-line {
      display: block;
      font-size: clamp(1.25rem, 3.5vw, 2.35rem);
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(90deg, #ffffff, #ff86df, #8ef2ff, #ffffff);
      background-size: 250% 250%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 18px rgba(255,255,255,.28);
      animation: textShine 3s linear infinite;
    }

    .message-line.second {
      margin-top: 8px;
      letter-spacing: 2px;
      font-size: clamp(1.05rem, 3vw, 1.9rem);
    }

    @keyframes textShine {
      0% { background-position: 0% 50%; }
      100% { background-position: 250% 50%; }
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 26px;
    }

    .dots span {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff2fcf, #00d9ff);
      box-shadow: 0 0 18px currentColor;
      animation: dotBounce 1.4s infinite ease-in-out;
    }

    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .3s; }
    .dots span:nth-child(4) { animation-delay: .45s; }
    .dots span:nth-child(5) { animation-delay: .6s; }

    @keyframes dotBounce {
      0%, 100% { transform: translateY(0) scale(.85); opacity: .5; }
      50% { transform: translateY(-14px) scale(1.25); opacity: 1; }
    }

    .firework {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: explode 2.8s infinite ease-out;
      opacity: 0;
      z-index: 2;
    }

    .firework:nth-child(1) { left: 15%; top: 18%; background: #ff2fcf; animation-delay: 0s; }
    .firework:nth-child(2) { left: 82%; top: 17%; background: #00d9ff; animation-delay: .7s; }
    .firework:nth-child(3) { left: 72%; top: 35%; background: #ffaa00; animation-delay: 1.4s; }
    .firework:nth-child(4) { left: 26%; top: 36%; background: #9d4dff; animation-delay: 2s; }
    .firework:nth-child(5) { left: 50%; top: 20%; background: #ffffff; animation-delay: 1s; }

    @keyframes explode {
      0% {
        opacity: 1;
        box-shadow:
          0 0 0 0 currentColor,
          0 0 0 0 currentColor,
          0 0 0 0 currentColor,
          0 0 0 0 currentColor,
          0 0 0 0 currentColor,
          0 0 0 0 currentColor,
          0 0 0 0 currentColor,
          0 0 0 0 currentColor;
      }
      70% {
        opacity: 1;
        box-shadow:
          0 -85px 0 2px currentColor,
          60px -60px 0 2px currentColor,
          85px 0 0 2px currentColor,
          60px 60px 0 2px currentColor,
          0 85px 0 2px currentColor,
          -60px 60px 0 2px currentColor,
          -85px 0 0 2px currentColor,
          -60px -60px 0 2px currentColor;
      }
      100% {
        opacity: 0;
      }
    }

    .glow-floor {
      position: fixed;
      left: 50%;
      bottom: -18%;
      width: 950px;
      height: 430px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(0, 217, 255, 0.28), rgba(255, 47, 207, 0.18), transparent 70%);
      filter: blur(10px);
      z-index: 1;
      animation: floorGlow 4s ease-in-out infinite alternate;
    }

    @keyframes floorGlow {
      from { opacity: 0.45; }
      to { opacity: 1; }
    }

    @media (max-width: 600px) {
      .title {
        letter-spacing: 2px;
        -webkit-text-stroke: 1px rgba(255,255,255,0.55);
      }

      .orbit {
        height: 85px;
        top: 43%;
      }

      .message-wrap {
        padding: 15px 18px;
      }

      .message-line {
        letter-spacing: 2px;
      }
    }
    .music-btn {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 20;
  padding: 12px 18px;
  border: none;
  border-radius: 999px;
  color: white;
  background: linear-gradient(90deg, #ff2fcf, #00d9ff);
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 18px rgba(0,217,255,.6);
}
  </style>
</head>

<body>
  <audio autoplay muted loop id="bgMusic">
    <source src="audio/background.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵 Music</button>
  <div class="stars"></div>
  <div class="glow-floor"></div>

  <div class="firework"></div>
  <div class="firework"></div>
  <div class="firework"></div>
  <div class="firework"></div>
  <div class="firework"></div>

  <main class="container">
    <div class="orbit"></div>

    <h1 class="title">CHAYNOVA</h1>

    <div class="message-wrap">
      <span class="message-line">Please wait,</span>
      <span class="message-line second">it will be coming up soon...</span>

      <div class="dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </main>
  <script>
const music = document.getElementById("bgMusic");

document.addEventListener("click", () => {
    music.muted = false;
    music.play();
}, { once: true });
</script>
</body>
</html>
