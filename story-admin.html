<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAYNOVA Story Admin</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#060020;
    color:white;
    max-width:900px;
    margin:auto;
    padding:30px;
}

h1{
    color:#00d4ff;
    text-align:center;
}

input,textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:20px;
    background:#111;
    color:white;
    border:1px solid #00d4ff;
    border-radius:8px;
    box-sizing:border-box;
}

textarea{
    height:300px;
    resize:vertical;
}

button{
    background:#00d4ff;
    color:#000;
    border:none;
    padding:15px 40px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00ffff;
}

img{
    max-width:250px;
    margin-top:15px;
    display:none;
    border-radius:10px;
}

#status{
    margin-top:20px;
    font-size:18px;
    color:#7CFC00;
}
</style>
</head>

<body>

<h1>CHAYNOVA Story Admin</h1>

<label>Story Title</label>
<input id="title" placeholder="Title">

<label>Story</label>
<textarea id="story" placeholder="Write your story..."></textarea>

<label>Image</label>
<input id="image" type="file" accept="image/*">

<img id="preview">

<br><br>

<button onclick="uploadStory()">Submit Story</button>

<div id="status"></div>

<script>
const workerURL = "https://chay1api.mikebewise.workers.dev";

image.onchange = () => {
    const file = image.files[0];
    if (!file) return;

    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
};

async function uploadStory() {
    status.innerHTML = "Uploading...";

    const fd = new FormData();

    fd.append("title", title.value);
    fd.append("story", story.value);

    if (image.files[0]) {
        fd.append("image", image.files[0]);
    }

    const r = await fetch(workerURL, {
        method: "POST",
        body: fd
    });

    const result = await r.text();
    status.innerHTML = result;

    if (r.ok) {
        window.location.href = "story.html";
    }
}
</script>

</body>
</html>
